{% extends "base.html" %}

{% block extra_css %}

<style>

.user-id{

font-size:32px;

font-weight:700;

margin:24px 0;

color:var(--cyan);

text-align:center;

letter-spacing:1px;

}

.btn-primary{

display:inline-block;

padding:12px 24px;

background:linear-gradient(
135deg,
var(--emerald),
var(--cyan)
);

color:white;

font-weight:600;

text-decoration:none;

border-radius:10px;

transition:all 0.25s ease;

box-shadow:0 6px 15px rgba(0,0,0,0.2);

}

.btn-primary:active{

transform:scale(0.97);

}

.btn-primary:hover{

transform:translateY(-2px);

box-shadow:0 12px 26px rgba(0,0,0,0.25);

}

.create-card{

animation:fadeIn 0.6s ease;

}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

</style>

{% endblock %}
{% block title %}Cuenta creada{% endblock %}

{% block content %}

<div class="create-container">

<div class="create-card">

<h2>Cuenta creada 🎉</h2>

<p style="margin-top:20px;font-size:16px">

Tu <b>ID de usuario</b> es:

</p>

<div class="user-id">
{{ user_id }}
</div>

<p style="text-align:center">

Guarda este ID de usuario.
Lo necesitarás para iniciar sesión en el sistema.

</p>

<div class="actions" style="justify-content:center">

    <a href="{{ url_for('login') }}" class="btn-primary">
        Ir al login
    </a>

</div>

</div>

</div>

{% endblock %}
