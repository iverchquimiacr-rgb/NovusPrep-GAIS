{% extends "base.html" %}

{% block title %}Crear cuenta{% endblock %}

{% block extra_css %}

<style>

/* =========================
CONTENEDOR
========================= */

.create-container{
display:flex;
justify-content:center;
margin-top:50px;
}

/* =========================
CARD
========================= */

.create-card{

width:420px;

background:white;

color:#0f172a;

padding:36px;

border-radius:18px;

box-shadow:0 20px 45px rgba(0,0,0,0.25);

}

/* =========================
TÍTULO
========================= */

.create-card h2{

margin-bottom:22px;

font-size:24px;

background:linear-gradient(
90deg,
var(--cyan),
var(--purple)
);

background-clip:text;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

/* =========================
FORMULARIO
========================= */

.form-group{
display:flex;
flex-direction:column;
margin-bottom:18px;
}

.form-group label{

margin-bottom:6px;

font-size:14px;

font-weight:500;

color:#374151;

}

.form-group input{

padding:12px;

border-radius:10px;

border:1px solid #d1d5db;

font-size:14px;

transition:all 0.2s ease;

}

/* INPUT FOCUS */

.form-group input:focus{

outline:none;

border-color:var(--cyan);

box-shadow:0 0 0 3px rgba(0,212,255,0.18);

}

/* =========================
BOTÓN CREAR
========================= */

.submit{

display:inline-block;

margin-top:20px;

padding:12px 26px;

font-weight:600;

color:white;

border:none;

cursor:pointer;

background:linear-gradient(
135deg,
var(--emerald),
var(--cyan)
);

border-radius:10px;

box-shadow:0 6px 15px rgba(0,0,0,0.2);

transition:all 0.25s ease;

}

.submit:hover{

transform:translateY(-3px);

box-shadow:0 12px 26px rgba(0,0,0,0.28);

}

.create-subtitle{

font-size:14px;

opacity:0.75;

margin-bottom:20px;

}

.submit:active{

transform:scale(0.98);

}


.create-card{

animation:fadeIn 0.6s ease;

}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* =========================
ERROR
========================= */
.error-box{

background:#fee2e2;

color:#991b1b;

padding:14px;

border-radius:10px;

margin-bottom:20px;

font-size:14px;

border-left:5px solid #ef4444;

box-shadow:0 6px 14px rgba(0,0,0,0.1);

}

/* =========================
ACCIONES
========================= */

.actions{

margin-top:20px;

display:flex;

justify-content:center;

}

.login-link{

text-decoration:none;

font-weight:600;

color:var(--cyan);

}

</style>

{% endblock %}

{% block content %}

<div class="create-container">

<div class="create-card">

<h2>Crear cuenta</h2>

<p class="create-subtitle">
Regístrate para acceder al sistema y gestionar tus pagos.
</p>

{% if error %}
<div class="error-box">
{{ error }}
</div>
{% endif %}

<form method="POST">

<div class="form-group">
<label>Nombre</label>
<input type="text" name="nombre" placeholder="Tu nombre" required autofocus>
</div>

<div class="form-group">
<label>Contraseña</label>
<input type="password" name="password" placeholder="Crea una contraseña" required>
</div>

<!-- TURNSTILE CAPTCHA -->
<div style="margin-top:20px; display:flex; justify-content:center;">
<div class="cf-turnstile"
data-sitekey="{{ turnstile_site_key }}">
</div>
</div>

<button type="submit" class="submit">
Crear cuenta
</button>

</form>

<div class="actions">

<a class="login-link" href="{{ url_for('login') }}">
¿Ya tienes una cuenta? Inicia sesión
</a>

</div>

</div>

</div>

<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

{% endblock %}
