<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>{% block title %}NovusPrep{% endblock %}</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="icon" href="{{ url_for('static', filename='img/Logo.png') }}">

<style>

/* =========================
NOVUSPREP DESIGN SYSTEM
========================= */

:root{

/* COLORES DE MARCA */

--cyan:#00D4FF;
--purple:#BB86FC;
--emerald:#00C853;

/* VARIANTES */

--cyan-soft:#35e0ff;
--purple-soft:#cda5ff;
--emerald-soft:#2eea74;

/* FONDOS */

--bg-dark:#0B0F19;
--bg-dark-2:#05070E;

/* CARDS */

--bg-card:#ffffff;

/* TEXTO */

--text-light:#e2e8f0;
--text-muted:#94a3b8;

}

/* =========================
RESET
========================= */

*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:"Inter",sans-serif;

}

body{

background:linear-gradient(
135deg,
var(--bg-dark),
var(--bg-dark-2)
);

color:white;

min-height:100vh;

}

/* =========================
WATERMARK LOGO
========================= */

.watermark{

position:fixed;

top:50%;
left:50%;

transform:translate(-50%,-50%);

width:450px;
height:450px;

background-image:url("/static/img/Logo.png");

background-repeat:no-repeat;
background-position:center;
background-size:contain;

opacity:0.10;

pointer-events:none;

z-index:0;

}

/* =========================
NAVBAR
========================= */

.navbar{

background:#05070E;

border-bottom:1px solid rgba(255,255,255,0.06);

padding:14px 30px;

display:flex;
align-items:center;
justify-content:space-between;

box-shadow:0 5px 18px rgba(0,0,0,0.45);

}

/* =========================
LOGO
========================= */

.logo{

display:flex;
align-items:center;
gap:10px;

font-weight:700;
font-size:18px;

color:white;

}

.logo img{

height:38px;
width:auto;

}

.logo-text{

font-weight:700;

background:linear-gradient(
90deg,
var(--cyan),
var(--purple),
var(--emerald)
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

background-clip:text;
color:transparent;

}

/* =========================
BADGES MODERNOS (NUEVO SISTEMA)
========================= */

.badge-aprobado{
background:#22C55E22;
color:#166534;
padding:6px 10px;
border-radius:8px;
font-size:12px;
font-weight:600;
}

.badge-pendiente{
background:#FACC1522;
color:#a16207;
padding:6px 10px;
border-radius:8px;
font-size:12px;
font-weight:600;
}

.badge-rechazado{
background:#EF444422;
color:#991b1b;
padding:6px 10px;
border-radius:8px;
font-size:12px;
font-weight:600;
}

/* =========================
FIX GLOBAL PARA CARDS CLARAS
========================= */

.card,
.table-card,
.user-table,
.admin-table{
color:#0f172a;
}

/* =========================
NAV LINKS
========================= */

.nav-links{

display:flex;
gap:18px;

}

.nav-links a{

text-decoration:none;

color:var(--text-light);

font-size:14px;
font-weight:500;

padding:6px 10px;

border-radius:8px;

transition:0.25s;

}

.nav-links a:hover{

background:rgba(255,255,255,0.08);

color:white;

}

/* =========================
CONTENEDOR
========================= */

.main-container{

max-width:1100px;

margin:40px auto;

padding:0 20px;

position:relative;
z-index:1;

}

/* =========================
CARDS
========================= */

.card{

background:white;

color:#0f172a;

padding:35px;

border-radius:18px;

box-shadow:0 20px 50px rgba(0,0,0,0.35);

}

/* =========================
BOTONES
========================= */

.btn-primary{

background:linear-gradient(
135deg,
var(--emerald),
var(--cyan)
);

border:none;

color:white;

padding:10px 18px;

border-radius:10px;

font-weight:600;

cursor:pointer;

transition:0.2s;

box-shadow:0 6px 16px rgba(0,0,0,0.25);

}

.btn-primary:hover{

transform:translateY(-2px);

box-shadow:0 10px 25px rgba(0,0,0,0.35);

}

/* BOTÓN SECUNDARIO */

.btn-secondary{

background:linear-gradient(
135deg,
var(--purple),
var(--cyan)
);

border:none;

color:white;

padding:8px 16px;

border-radius:10px;

cursor:pointer;

font-weight:500;

}

/* =========================
TABLAS
========================= */

.table-modern{

width:100%;

border-collapse:collapse;

margin-top:20px;

background:white;

color:#0f172a;

border-radius:10px;

overflow:hidden;

}

.table-modern th{

background:#0B0F19;

color:white;

padding:12px;

font-size:14px;

}

.table-modern td{

padding:12px;

border-bottom:1px solid #eee;

text-align:center;

}

.table-modern tr:hover{

background:#f5f7fb;

}

/* =========================
FORMULARIOS
========================= */

.form-group{

margin-bottom:18px;

}

.form-group label{

display:block;

font-size:14px;

margin-bottom:5px;

color:#0f172a;

}

.form-group input,
.form-group select{

width:100%;

padding:10px;

border-radius:8px;

border:1px solid #ddd;

}

/* =========================
BADGES
========================= */

.badge-green{

background:var(--emerald);

color:white;

padding:4px 10px;

border-radius:8px;

font-size:12px;

}

.badge-yellow{

background:#FFC107;

color:black;

padding:4px 10px;

border-radius:8px;

font-size:12px;

}

.badge-red{

background:#ef4444;

color:white;

padding:4px 10px;

border-radius:8px;

font-size:12px;

}

/* =========================
MENSAJES
========================= */

.message-success{

background:#e8fdf2;

color:#047857;

padding:10px;

border-radius:8px;

margin-bottom:15px;

}

.message-error{

background:#fdeaea;

color:#b91c1c;

padding:10px;

border-radius:8px;

margin-bottom:15px;

}

/* =========================
FOOTER
========================= */

.footer{

margin-top:60px;

text-align:center;

font-size:13px;

color:var(--text-muted);

}

/* =========================
RESPONSIVE
========================= */

@media(max-width:800px){

.nav-links{

display:none;

}

.main-container{

margin:20px auto;

}

}

</style>

<link rel="stylesheet" href="/static/css/ui.css">
{% block extra_css %}{% endblock %}

<script src="https://unpkg.com/lucide@latest"></script>

</head>

<body>

<div class="watermark"></div>

<div class="navbar">

<div class="logo">
<img src="{{ url_for('static', filename='img/Lognoa.png') }}">
</div>

<div class="nav-links">

{% if session.get("user_id") %}

{% if session.get("rol") == "Admin" %}

<a href="/admin/usuarios">Usuarios</a>
<a href="/admin/pagos">Pagos</a>

{% endif %}

<a href="/logout">Salir</a>

{% endif %}

</div>

</div>

<div class="main-container">

{% block content %}
{% endblock %}

</div>

<div class="footer">

© 2026 NovusPrep — Quality and confidence forever

</div>

<script>
lucide.createIcons();
</script>

</body>
</html>
