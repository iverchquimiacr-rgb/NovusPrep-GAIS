{% extends "base.html" %}

{% block title %}Subir comprobante{% endblock %}

{% block extra_css %}

<style>

/* =========================
CONTENEDOR
========================= */

.upload-container{

display:flex;

justify-content:center;

margin-top:40px;

}

/* =========================
CARD
========================= */

.upload-card{

width:500px;

background:white;

color:#0f172a;

padding:35px;

border-radius:18px;

box-shadow:0 20px 45px rgba(0,0,0,0.25);

}

/* =========================
TÍTULO
========================= */

.upload-card h2{

margin-bottom:10px;

font-size:26px;

background:linear-gradient(
90deg,
var(--cyan),
var(--purple)
);

background-clip:text;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

/* =========================
INFO USUARIO
========================= */

.user-info{

margin-bottom:20px;

color:#475569;

font-size:15px;

}

/* =========================
FORMULARIO
========================= */

.form-group{

display:flex;

flex-direction:column;

margin-bottom:20px;

}

.form-group label{

margin-bottom:6px;

font-size:14px;

font-weight:500;

}

/* INPUTS */

.form-group select,
.form-group input[type="file"]{

padding:12px;

border-radius:10px;

border:1px solid #e2e8f0;

font-size:14px;

transition:all 0.2s ease;

}

/* FOCUS */

.form-group select:focus,
.form-group input[type="file"]:focus{

outline:none;

border-color:var(--cyan);

box-shadow:0 0 0 2px rgba(56,189,248,0.2);

}

/* =========================
BOTÓN
========================= */

.submit{

display:inline-block;

margin-top:20px;

padding:12px 26px;

font-weight:600;

color:white;

background:linear-gradient(
135deg,
var(--emerald),
var(--cyan)
);

border:none;

border-radius:10px;

cursor:pointer;

box-shadow:0 6px 14px rgba(0,0,0,0.15);

transition:all 0.25s ease;

}

.submit:hover{

transform:translateY(-3px);

box-shadow:0 12px 24px rgba(0,0,0,0.25);

}

/* =========================
HEADER
========================= */

.upload-header{
margin-bottom:20px;
}

.upload-subtitle{

margin-top:4px;

color:#64748b;

font-size:14px;

}

/* =========================
MENSAJE ÉXITO
========================= */

.success-box{

background:#ecfdf5;

color:#065f46;

padding:12px;

border-radius:10px;

margin-bottom:20px;

font-weight:500;

}

/* =========================
FILE HINT
========================= */

.file-hint{

font-size:12px;

color:#64748b;

margin-top:6px;

display:block;

}

/* =========================
BOTÓN VOLVER
========================= */

.back-link{

display:inline-block;

margin-top:20px;

padding:10px 22px;

text-decoration:none;

color:white;

font-weight:600;

background:linear-gradient(
135deg,
var(--emerald),
var(--cyan)
);

border-radius:10px;

box-shadow:0 6px 15px rgba(0,0,0,0.2);

transition:all 0.25s ease;

}

.back-link:hover{

transform:translateY(-3px);

box-shadow:0 12px 26px rgba(0,0,0,0.25);

}

/* =========================
ACCIONES
========================= */

.actions{

margin-top:20px;

display:flex;

justify-content:space-between;

align-items:center;

flex-wrap:wrap;

gap:10px;

}

</style>

{% endblock %}

{% block content %}

<div class="upload-container">

<div class="card upload-card">

<div class="upload-header">

<h2>📄 Subir comprobante de pago</h2>

<p class="upload-subtitle">
Usuario: <strong>{{ nombre }}</strong>
</p>

</div>

{% if mensaje %}
<div class="success-box">

✅ {{ mensaje }}

</div>
{% endif %}

<form method="post" enctype="multipart/form-data">

<div class="form-group">

<label>Selecciona el pago</label>

<select name="payment_id" required>

{% for p in pagos %}

<option value="{{ p.ID }}">
Pago #{{ p.ID }} — S/ {{ p.Monto }} — {{ p.Fecha }}
</option>

{% endfor %}

</select>

</div>

<div class="form-group">

<label>Selecciona tu comprobante (JPG, PNG o PDF)</label>

<input type="file" name="archivo" required>

<small class="file-hint">
Formatos permitidos: JPG, PNG o PDF
</small>

</div>

<button type="submit" class="btn-primary">

📤 Subir comprobante

</button>

</form>

<div class="actions">

<a href="/dashboard">

<button class="btn-secondary">

🏠 Volver al panel

</button>

</a>

</div>

</div>

</div>

{% endblock %}
