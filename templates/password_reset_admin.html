{% extends "base.html" %}

{% block title %}Contraseña generada{% endblock %}

{% block extra_css %}

<style>

/* =========================
CONTENEDOR
========================= */

.reset-container{
max-width:600px;
margin:60px auto;
}

/* =========================
CARD
========================= */

.reset-card{

background:white;

color:#0f172a;

padding:40px;

border-radius:18px;

box-shadow:0 20px 50px rgba(0,0,0,0.25);

text-align:center;

}

/* =========================
TÍTULO
========================= */

.reset-title{

font-size:26px;

margin-bottom:15px;

background:linear-gradient(
90deg,
var(--cyan),
var(--purple)
);

background-clip:text;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

/* =========================
MENSAJE
========================= */

.reset-warning{

font-size:14px;

margin-bottom:20px;

color:#64748b;

font-weight:500;

}

/* =========================
PASSWORD
========================= */

.password-box{

background:#0f172a;

color:#facc15;

padding:20px;

border-radius:12px;

font-size:26px;

font-weight:bold;

letter-spacing:3px;

margin:20px 0;

box-shadow:inset 0 0 0 2px #1e293b;

}

/* =========================
BOTÓN COPIAR
========================= */

.copy-btn{

margin-top:10px;

padding:6px 12px;

border:none;

border-radius:8px;

background:linear-gradient(
135deg,
var(--purple),
var(--cyan)
);

color:white;

font-size:12px;

cursor:pointer;

transition:all 0.2s ease;

box-shadow:0 4px 10px rgba(0,0,0,0.2);

}

.copy-btn:hover{

transform:translateY(-2px);

box-shadow:0 8px 18px rgba(0,0,0,0.25);

}

/* =========================
NOTA
========================= */

.note{

font-size:14px;

color:#475569;

margin-bottom:30px;

}

/* =========================
BOTÓN VOLVER
========================= */

.back-btn{

padding:12px 20px;

border:none;

border-radius:10px;

background:linear-gradient(
135deg,
var(--emerald),
var(--cyan)
);

color:white;

font-weight:600;

cursor:pointer;

box-shadow:0 6px 15px rgba(0,0,0,0.2);

transition:all 0.25s ease;

}

.back-btn:hover{

transform:translateY(-2px);

box-shadow:0 10px 25px rgba(0,0,0,0.25);

}

</style>

{% endblock %}

{% block content %}

<div class="reset-container">

<div class="reset-card">

<div class="reset-title">
🔐 Contraseña temporal generada
</div>

<p class="reset-warning">
Esta contraseña se muestra <strong>una sola vez</strong>.
</p>

<div class="password-box" id="generatedPassword">
{{ password }}
</div>

<button onclick="copyPassword()" class="copy-btn">
Copiar contraseña
</button>

<p class="note">
El usuario deberá cambiarla al iniciar sesión.
</p>

<a href="/admin/usuario/{{ user_id }}">
<button class="back-btn">
⬅ Volver al perfil
</button>
</a>

</div>

</div>

{% endblock %}

<script>

function copyPassword(){

const text = document.getElementById("generatedPassword").innerText;

navigator.clipboard.writeText(text);

alert("Contraseña copiada");

}

</script>
