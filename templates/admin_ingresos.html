{% extends "base.html" %}

{% block title %}Ingresos{% endblock %}

{% block extra_css %}
<style>

/* =========================
CONTENEDOR
========================= */

.catalog-container{
margin-top:30px;
}

.catalog-header{
margin-bottom:20px;
}

.catalog-header p{
color:var(--text-muted);
}

/* =========================
TARJETA INGRESOS
========================= */

.income-card{

margin-top:20px;

background:white;

padding:25px;

border-radius:16px;

box-shadow:0 15px 35px rgba(0,0,0,0.25);

display:flex;

flex-direction:column;

gap:5px;

max-width:260px;

}

.income-label{

font-size:13px;

color:#64748b;

}

.income-value{

font-size:28px;

font-weight:700;

background:linear-gradient(
90deg,
var(--emerald),
var(--cyan)
);

background-clip:text;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

/* =========================
TÍTULOS
========================= */

.catalog-container h2{

font-size:28px;

background:linear-gradient(
90deg,
var(--cyan),
var(--purple)
);

background-clip:text;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

margin-bottom:6px;

}

.catalog-container h3{

font-size:18px;
color:var(--text-light);
margin-top:5px;

}

/* =========================
TABLA (si se usa en futuro)
========================= */

.catalog-table{

width:100%;
border-collapse:collapse;

background:white;

color:#0f172a;

border-radius:16px;

overflow:hidden;

box-shadow:0 20px 45px rgba(0,0,0,0.25);

}

.catalog-table th{

background:linear-gradient(
135deg,
var(--emerald),
var(--cyan)
);

color:white;

padding:14px;

text-align:left;

font-size:14px;

}

.catalog-table td{

padding:14px;

border-bottom:1px solid #eee;

font-size:14px;

}

.catalog-table tr:hover{

background:#f5f7fb;

}

/* =========================
BADGES
========================= */

.badge-paid{

background:#FFD70022;

color:#a87900;

padding:6px 10px;

border-radius:8px;

font-size:12px;

font-weight:600;

}

.badge-free{

background:#00C85322;

color:#047857;

padding:6px 10px;

border-radius:8px;

font-size:12px;

font-weight:600;

}

.chart-title{

font-size:16px;

color:#334155;

margin-bottom:15px;

}

/* =========================
BOTÓN DRIVE
========================= */

.drive-btn{

padding:8px 14px;

border-radius:8px;

background:linear-gradient(
135deg,
var(--purple),
var(--cyan)
);

color:white;

text-decoration:none;

font-size:13px;

font-weight:500;

transition:0.25s;

box-shadow:0 4px 10px rgba(0,0,0,0.2);

}

.drive-btn:hover{

transform:translateY(-2px);

box-shadow:0 8px 18px rgba(0,0,0,0.25);

}

/* =========================
GRÁFICO
========================= */

.chart-container{

margin-top:30px;

background:white;

padding:30px;

border-radius:18px;

box-shadow:0 20px 45px rgba(0,0,0,0.25);

}

/* =========================
BOTÓN VOLVER
========================= */

.back-link{

display:inline-block;

margin-top:25px;

padding:11px 24px;

text-decoration:none;

color:white;

font-weight:600;

background:linear-gradient(
135deg,
var(--emerald),
var(--cyan)
);

border-radius:10px;

box-shadow:0 6px 15px rgba(0,0,0,0.2);

transition:all 0.25s ease;

}

.back-link:hover{

transform:translateY(-3px);

box-shadow:0 12px 26px rgba(0,0,0,0.25);

}

</style>
{% endblock %}

{% block content %}

<div class="catalog-container">

<h2>Ingresos del sistema</h2>

<div class="income-card">

<div class="income-label">
Total de ingresos
</div>

<div class="income-value">
S/ {{ "%.2f"|format(total) }}
</div>

</div>

<div class="chart-container">

<h3 class="chart-title">
Ingresos mensuales
</h3>

<canvas id="incomeChart"></canvas>

</div>

</div>

<div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

const labels = {{ labels | tojson }};
const data = {{ valores | tojson }};

const ctx = document.getElementById("incomeChart").getContext("2d");

new Chart(ctx, {

type: "line",

data: {
labels: labels,
datasets: [{

label: "Ingresos mensuales",

data: data,

borderColor: "#00D4FF",
backgroundColor: "#00D4FF22",

borderWidth: 3,

pointBackgroundColor:"#BB86FC",

pointRadius:4,

fill:true,

tension:0.35

}]
},

options: {

responsive:true,

plugins:{
legend:{
display:true
}
},

scales:{
y:{
beginAtZero:true
}
}

}

});

</script>

</div>

<div>

<a class="back-link" href="/dashboard">
🏠 Volver al panel
</a>

</div>

{% endblock %}
